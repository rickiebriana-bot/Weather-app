<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Reality</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

h1{text-align:center;}

.search{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:12px;
    width:260px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007aff;
    color:white;
    margin-left:6px;
}

.card{
    background:white;
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.best{
    border:3px solid #22c55e;
}

.icon{
    font-size:34px;
}

.small{
    color:#666;
    margin-top:6px;
}

.score{
    font-size:18px;
    font-weight:bold;
    margin-top:6px;
}

.locationInfo{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}

.detailsBtn{
    margin-top:10px;
    padding:8px 10px;
    border:none;
    border-radius:8px;
    background:#eee;
    cursor:pointer;
}

.details{
    display:none;
    margin-top:10px;
    padding:10px;
    background:#f9fafb;
    border-radius:10px;
    font-size:14px;
    color:#333;
}
</style>
</head>

<body>

<h1>☀️ Weather Reality</h1>

<div class="search">
    <input id="location" placeholder="City, State (e.g. Revere, MA)">
    <button onclick="run()">Check</button>
</div>

<div id="results"></div>

<script>

function getIcon(score){
    if(score >= 90) return "☀️";
    if(score >= 80) return "⛅";
    if(score >= 70) return "🌤";
    if(score >= 60) return "🌥";
    return "🌧";
}

function getLabel(score){
    if(score >= 90) return "Great day";
    if(score >= 80) return "Good day";
    if(score >= 70) return "Alright";
    if(score >= 60) return "Mixed";
    return "Poor conditions";
}

// detect rain “events”
function detectRainEvents(values, threshold=40){
    let events = 0;
    let inEvent = false;

    for(let v of values){
        if(v >= threshold && !inEvent){
            events++;
            inEvent = true;
        } else if(v < threshold){
            inEvent = false;
        }
    }

    return events;
}

// COMFORT MODEL (softened)
function comfortScore(temp, wind){

    let score = 92; // not 100 — avoids harsh drops

    // wind penalty (soft)
    if(wind < 10) score -= 0;
    else if(wind < 20) score -= 3;
    else if(wind < 30) score -= 8;
    else score -= 15;

    // temperature penalty (smooth)
    const ideal = 72;
    const tempPenalty = Math.min(20, Math.abs(temp - ideal) * 0.8);

    score -= tempPenalty;

    return score;
}

function toggleDetails(id){
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

async function run(){

    const locationInput = document.getElementById("location").value.trim();

    if(!locationInput){
        alert("Enter a location");
        return;
    }

    document.getElementById("results").innerHTML = "Loading...";

    const cityQuery = locationInput.split(',')[0];

    try{

        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery)}&count=1`
        );

        const geoData = await geo.json();

        if(!geoData.results){
            document.getElementById("results").innerHTML = "Location not found";
            return;
        }

        const { latitude, longitude, name, admin1 } = geoData.results[0];

        const weather = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=precipitation_probability,temperature_2m,wind_speed_10m&forecast_days=7&timezone=auto`
        );

        const data = await weather.json();

        const times = data.hourly.time;
        const precip = data.hourly.precipitation_probability;
        const temp = data.hourly.temperature_2m;
        const wind = data.hourly.wind_speed_10m;

        const days = {};

        times.forEach((t, i) => {
            const date = t.split("T")[0];
            const hour = parseInt(t.split("T")[1].slice(0,2));

            if(!days[date]){
                days[date] = [];
            }

            days[date].push({
                hour,
                precip: precip[i] || 0,
                temp: temp[i] || 70,
                wind: wind[i] || 5
            });
        });

        const dayKeys = Object.keys(days).slice(0,7);

        let results = [];
        let bestIndex = 0;
        let bestScore = -Infinity;

        dayKeys.forEach((date, idx) => {

            const entries = days[date];

            const daytime = entries.filter(e => e.hour >= 7 && e.hour <= 19);

            const precipVals = daytime.map(e => e.precip);
            const rainEvents = detectRainEvents(precipVals);

            const comfortVals = daytime.map(e =>
                comfortScore(e.temp, e.wind)
            );

            const avgComfort =
                comfortVals.reduce((a,b)=>a+b,0) / (comfortVals.length || 1);

            // softened rain penalty
            const rainPenalty = (rainEvents * 8);

            const score = avgComfort - rainPenalty;

            const clamped = Math.max(0, Math.min(100, score));

            if(clamped > bestScore){
                bestScore = clamped;
                bestIndex = idx;
            }

            results.push({
                date,
                score: clamped,
                rainEvents,
                avgComfort,
                rainPenalty
            });
        });

        let html = `
<h2>${name}, ${admin1 || ""}</h2>
<div class="locationInfo">7-day “usable weather” forecast</div>
`;

        results.forEach((d, i) => {

            const icon = getIcon(d.score);
            const label = getLabel(d.score);

            const dateObj = new Date(d.date);
            const labelDate = i === 0 ? "Today" :
                              i === 1 ? "Tomorrow" :
                              dateObj.toLocaleDateString("en-US", { weekday:"long" });

            const detailId = "detail_" + i;

            html += `
<div class="card ${i===bestIndex ? "best" : ""}">

    <div class="icon">${icon}</div>

    <h3>${label}</h3>

    <strong>${labelDate}</strong>

    <div class="score">
        Score: ${d.score.toFixed(0)} / 100
    </div>

    <button class="detailsBtn" onclick="toggleDetails('${detailId}')">
        Why this score?
    </button>

    <div class="details" id="${detailId}">

        <div><b>Base comfort:</b> ${d.avgComfort.toFixed(1)}</div>

        <div><b>Rain events:</b> ${d.rainEvents} (-${d.rainPenalty})</div>

        <div><b>Final score:</b> comfort - rain penalty</div>

    </div>

</div>
`;
        });

        document.getElementById("results").innerHTML = html;

    }
    catch(e){
        console.log(e);
        document.getElementById("results").innerHTML = "Error loading weather";
    }
}

</script>

</body>
</html>
