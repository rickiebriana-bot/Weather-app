<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Reality</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

h1{text-align:center;}

.search{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:12px;
    width:260px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007aff;
    color:white;
    margin-left:6px;
}

.card{
    background:white;
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.best{
    border:3px solid #22c55e;
}

.icon{
    font-size:34px;
}

.small{
    color:#666;
    margin-top:6px;
}

.score{
    font-size:18px;
    font-weight:bold;
    margin-top:6px;
}

.locationInfo{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>☀️ Weather Reality</h1>

<div class="search">
    <input id="location" placeholder="City, State (e.g. Revere, MA)">
    <button onclick="run()">Check</button>
</div>

<div id="results"></div>

<script>

function getIcon(score){
    if(score >= 80) return "☀️";
    if(score >= 60) return "⛅";
    if(score >= 40) return "🌥";
    return "🌧";
}

function getLabel(score){
    if(score >= 80) return "Great day";
    if(score >= 60) return "Good day";
    if(score >= 40) return "Mixed";
    return "Poor conditions";
}

function detectRainEvents(values, threshold=40){
    let events = 0;
    let inEvent = false;

    for(let v of values){
        if(v >= threshold && !inEvent){
            events++;
            inEvent = true;
        } else if(v < threshold){
            inEvent = false;
        }
    }

    return events;
}

async function run(){

    const locationInput = document.getElementById("location").value.trim();

    if(!locationInput){
        alert("Enter a location");
        return;
    }

    document.getElementById("results").innerHTML = "Loading...";

    const cityQuery = locationInput.split(',')[0];

    try{

        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery)}&count=1`
        );

        const geoData = await geo.json();

        if(!geoData.results){
            document.getElementById("results").innerHTML = "Location not found";
            return;
        }

        const { latitude, longitude, name, admin1 } = geoData.results[0];

        const weather = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=precipitation_probability&forecast_days=7&timezone=auto`
        );

        const data = await weather.json();

        const times = data.hourly.time;
        const precip = data.hourly.precipitation_probability;

        const days = {};

        // group by date
        times.forEach((t, i) => {
            const date = t.split("T")[0];
            const hour = parseInt(t.split("T")[1].slice(0,2));

            if(!days[date]){
                days[date] = [];
            }

            days[date].push({ hour, value: precip[i] || 0 });
        });

        const dayKeys = Object.keys(days).slice(0,7);

        let results = [];
        let bestIndex = 0;
        let bestScore = -Infinity;

        dayKeys.forEach((date, idx) => {

            const entries = days[date];

            // only daytime hours 7–19
            const daytime = entries.filter(e => e.hour >= 7 && e.hour <= 19);

            const values = daytime.map(e => e.value);

            const avgRain = values.reduce((a,b)=>a+b,0) / (values.length || 1);

            const rainEvents = detectRainEvents(values);

            const score = 100 - (avgRain * 0.8 + rainEvents * 15);

            const clamped = Math.max(0, Math.min(100, score));

            if(clamped > bestScore){
                bestScore = clamped;
                bestIndex = idx;
            }

            results.push({
                date,
                score: clamped,
                avgRain,
                rainEvents
            });
        });

        let html = `
<h2>${name}, ${admin1 || ""}</h2>
<div class="locationInfo">7-day “usable weather” forecast</div>
`;

        results.forEach((d, i) => {

            const icon = getIcon(d.score);
            const label = getLabel(d.score);

            const dateObj = new Date(d.date);
            const labelDate = i === 0 ? "Today" :
                              i === 1 ? "Tomorrow" :
                              dateObj.toLocaleDateString("en-US", { weekday:"long" });

            html += `
<div class="card ${i===bestIndex ? "best" : ""}">

    <div class="icon">${icon}</div>

    <h3>${label}</h3>

    <strong>${labelDate}</strong>

    <div class="small">
        Avg daytime rain: ${d.avgRain.toFixed(1)}%
    </div>

    <div class="score">
        Score: ${d.score.toFixed(0)} / 100
    </div>

    <div class="small">
        Rain events: ${d.rainEvents}
    </div>

</div>
`;
        });

        document.getElementById("results").innerHTML = html;

    }
    catch(e){
        console.log(e);
        document.getElementById("results").innerHTML = "Error loading weather";
    }
}

</script>

</body>
</html>
