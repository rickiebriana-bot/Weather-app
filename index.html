<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Reality</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

h1{text-align:center;}

.search{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    padding:12px;
    width:260px;
    border-radius:10px;
    border:1px solid #ccc;
    margin:4px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007aff;
    color:white;
}

.card{
    background:white;
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.score{
    font-size:40px;
    font-weight:bold;
}

.best{
    border:3px solid #22c55e;
}

.small{
    color:#666;
    margin-top:8px;
}

.temp{
    margin-top:6px;
    font-size:16px;
}

.locationInfo{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>☀️ Weather Reality</h1>

<div class="search">

    <input id="location" placeholder="City, State (e.g. Revere, MA)">

    <select id="activity">
        <option value="golf">⛳ Golf</option>
        <option value="beach">🏖 Beach</option>
        <option value="bbq">🍔 BBQ</option>
        <option value="walk">🚶 Walk</option>
        <option value="default">🌤 General</option>
    </select>

    <button onclick="run()">Check</button>
</div>

<div id="results"></div>

<script>

async function run(){

    const locationInput = document.getElementById("location").value.trim();
    const activity = document.getElementById("activity").value;

    if(!locationInput){
        alert("Enter a location");
        return;
    }

    document.getElementById("results").innerHTML = "Loading...";

    const parts = locationInput.split(',').map(p => p.trim()).filter(Boolean);
    const cityQuery = parts[0];
    const regionPart = parts[1] || null;

    const activityRules = {
        golf:   { start: 8, end: 15, rainTolerance: 2.5 },
        beach:  { start: 10, end: 18, rainTolerance: 1.5 },
        bbq:    { start: 15, end: 21, rainTolerance: 3.5 },
        walk:   { start: 7, end: 20, rainTolerance: 4 },
        default:{ start: 7, end: 21, rainTolerance: 3 }
    };

    const rule = activityRules[activity];

    const US_STATES = {
      "MA":"Massachusetts","CA":"California","NY":"New York"
      // (kept short for readability — your full map is fine too)
    };

    try{

        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery)}&count=5`
        );

        const geoData = await geo.json();

        if(!geoData.results){
            document.getElementById("results").innerHTML = "Location not found";
            return;
        }

        const result = geoData.results[0];

        const lat = result.latitude;
        const lon = result.longitude;

        const locationName = `${result.name}, ${result.admin1 || ""}`.replace(", ,", ",");

        const weather = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability&forecast_days=7&timezone=auto`
        );

        const weatherData = await weather.json();
        const hourly = weatherData.hourly.precipitation_probability;

        let html = `
<h2>${locationName}</h2>
<div class="locationInfo">
📍 Activity: <b>${activity.toUpperCase()}</b>
</div>
`;

        const days = [];
        let bestIndex = 0;

        for(let day = 0; day < 7; day++){

            let risk = 0;

            for(let h = rule.start; h <= rule.end; h++){
                risk += (hourly[(day * 24) + h] || 0) / 100;
            }

            let rating = "";
            let emoji = "";

            if(risk <= rule.rainTolerance){
                rating = "Great for " + activity;
                emoji = "🟢";
            } else if(risk <= rule.rainTolerance * 1.5){
                rating = "Playable";
                emoji = "🟡";
            } else {
                rating = "Bad conditions";
                emoji = "🔴";
            }

            days.push({ risk, rating, emoji });

            if(risk < (days[bestIndex]?.risk ?? 999)){
                bestIndex = day;
            }
        }

        const names = [];
        for(let i=0;i<7;i++){
            const d = new Date();
            d.setDate(d.getDate()+i);
            names.push(i===0?"Today":i===1?"Tomorrow":d.toLocaleDateString("en-US",{weekday:"long"}));
        }

        days.forEach((d,i)=>{

            html += `
<div class="card ${i===bestIndex?'best':''}">

    <div class="score">${d.emoji}</div>

    <h3>${d.rating}</h3>

    <strong>${names[i]}</strong>

    <div class="temp">
        Rain risk score: <b>${d.risk.toFixed(1)}</b>
    </div>

</div>
`;
        });

        document.getElementById("results").innerHTML = html;

    }
    catch(e){
        console.log(e);
        document.getElementById("results").innerHTML = "Error loading weather";
    }
}

</script>

</body>
</html>
