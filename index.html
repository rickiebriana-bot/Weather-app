<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Reality</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.search{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:12px;
    width:260px;
    border-radius:10px;
    border:1px solid #ccc;
    margin:4px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#007aff;
    color:white;
    cursor:pointer;
}

.card{
    background:white;
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.score{
    font-size:40px;
    font-weight:bold;
}

.best{
    border:3px solid #22c55e;
}

.small{
    color:#666;
    margin-top:8px;
}

.temp{
    margin-top:6px;
    font-size:16px;
}

.locationInfo{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}

.helper{
    font-size:12px;
    color:#777;
    margin-bottom:10px;
}

.dropdown{
    margin-bottom:15px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}
</style>
</head>

<body>

<h1>☀️ Weather Reality</h1>

<div class="search">

    <input id="location" placeholder="City, State (e.g. Revere, MA)">

    <div class="dropdown">
        ⏰ Activity window:
        <input id="startHour" placeholder="Start (7)" style="width:70px;">
        <input id="endHour" placeholder="End (21)" style="width:70px;">
    </div>

    <div class="helper">
        Leave blank = 7am–9pm default
    </div>

    <button onclick="run()">Check</button>
</div>

<div id="results"></div>

<script>

async function run(){

    const locationInput = document.getElementById("location").value.trim();

    if(!locationInput){
        alert("Enter a location");
        return;
    }

    document.getElementById("results").innerHTML = "Loading...";

    let startHour = parseInt(document.getElementById("startHour").value);
    let endHour = parseInt(document.getElementById("endHour").value);

    if(isNaN(startHour)) startHour = 7;
    if(isNaN(endHour)) endHour = 21;

    const showWindow = !(isNaN(parseInt(document.getElementById("startHour").value)) ||
                         isNaN(parseInt(document.getElementById("endHour").value)));

    const parts = locationInput.split(',').map(p => p.trim()).filter(Boolean);
    const cityQuery = parts[0];
    const regionPart = parts[1] || null;

    const US_STATES = {
      "AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut",
      "DE":"Delaware","FL":"Florida","GA":"Georgia","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa",
      "KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan",
      "MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire",
      "NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","OH":"Ohio","OK":"Oklahoma",
      "OR":"Oregon","PA":"Pennsylvania","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee",
      "TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"West Virginia","WI":"Wisconsin",
      "WY":"Wyoming","DC":"District of Columbia"
    };

    try{

        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery)}&count=10`
        );

        const geoData = await geo.json();

        if(!geoData.results || geoData.results.length === 0){
            document.getElementById("results").innerHTML = "Location not found";
            return;
        }

        let candidates = geoData.results;

        if(regionPart){
            const regionUpper = regionPart.toUpperCase();
            const regionLower = regionPart.toLowerCase();
            const regionFullState = US_STATES[regionUpper] || null;

            candidates = candidates.filter(r => {
                if(r.admin1){
                    const admin1 = r.admin1.toLowerCase();
                    if(regionFullState && admin1 === regionFullState.toLowerCase()) return true;
                    if(admin1 === regionLower) return true;
                }
                if(r.country && r.country.toLowerCase() === regionLower) return true;
                if(r.country_code && r.country_code.toUpperCase() === regionUpper) return true;
                return false;
            });
        }

        const result = (candidates.length > 0 ? candidates[0] : geoData.results[0]);

        const lat = result.latitude;
        const lon = result.longitude;

        const locationName = [
            result.name,
            result.admin1,
            result.country
        ].filter(Boolean).join(", ");

        const weather = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability&daily=temperature_2m_max,temperature_2m_min,precipitation_hours&forecast_days=7&temperature_unit=fahrenheit&timezone=auto`
        );

        const weatherData = await weather.json();

        const hourly = weatherData.hourly.precipitation_probability;

        let html = `
<h2>${locationName}</h2>

<div class="locationInfo">
📍 Lat: ${lat.toFixed(4)} &nbsp;&nbsp; Lon: ${lon.toFixed(4)}
</div>
`;

        if(showWindow){
            html += `
<div class="helper">
Activity window: <b>${startHour}:00 → ${endHour}:00</b>
</div>
`;
        }

        const days = [];
        let bestIndex = 0;

        for(let day = 0; day < 7; day++){

            let expectedRain = 0;

            for(let h = startHour; h <= endHour; h++){
                const chance = hourly[(day * 24) + h] || 0;
                expectedRain += chance / 100;
            }

            let rating = "";
            let emoji = "";

            if(expectedRain <= 1.5){
                rating = "Excellent for Plans";
                emoji = "🟢";
            } else if(expectedRain <= 3){
                rating = "Good for Plans";
                emoji = "🟢";
            } else if(expectedRain <= 5){
                rating = "Mixed Conditions";
                emoji = "🟡";
            } else if(expectedRain <= 7){
                rating = "Risky for Plans";
                emoji = "🟠";
            } else {
                rating = "Poor for Plans";
                emoji = "🔴";
            }

            let hourlyHtml = "";
            let rainBlocks = [];
            let rainStart = null;

            for(let h = startHour; h <= endHour; h++){

                const chance = hourly[(day * 24) + h] || 0;

                const label =
                    h === 0 ? "12 AM" :
                    h === 12 ? "12 PM" :
                    h > 12 ? (h - 12) + " PM" :
                    h + " AM";

                hourlyHtml += `
                <div style="display:flex;justify-content:space-between;">
                    <div>${label}</div>
                    <div>${chance}%</div>
                </div>
                `;

                if(chance >= 40){
                    if(rainStart === null) rainStart = h;
                } else {
                    if(rainStart !== null){
                        rainBlocks.push([rainStart, h - 1]);
                        rainStart = null;
                    }
                }
            }

            if(rainStart !== null){
                rainBlocks.push([rainStart, endHour]);
            }

            let rainSummary = "☀️ No meaningful rain in your window";

            if(rainBlocks.length > 0){
                rainSummary = "🌧 Rain: " + rainBlocks.map(b => {
                    const f = (h) => h === 12 ? "12pm" : h > 12 ? (h-12)+"pm" : h+"am";
                    return `${f(b[0])}–${f(b[1])}`;
                }).join(", ");
            }

            days.push({
                expectedRain,
                rating,
                emoji,
                hourlyHtml,
                rainSummary
            });

            if(expectedRain < days[bestIndex]?.expectedRain || day === 0){
                bestIndex = day;
            }
        }

        const weekdayNames = [];

        for(let i = 0; i < 7; i++){
            const date = new Date();
            date.setDate(date.getDate() + i);

            if(i === 0) weekdayNames.push("Today");
            else if(i === 1) weekdayNames.push("Tomorrow");
            else weekdayNames.push(date.toLocaleDateString("en-US",{weekday:"long"}));
        }

        days.forEach((d,index)=>{

            html += `
<div class="card ${index === bestIndex ? 'best' : ''}">

    <div class="score">${d.emoji}</div>

    <h3>${d.rating}</h3>

    <strong>${weekdayNames[index]}</strong>

    <div class="temp">
        ${d.rainSummary}
    </div>

    <details style="margin-top:10px;">
        <summary>Hourly breakdown</summary>
        <div style="margin-top:10px;">
            ${d.hourlyHtml}
        </div>
    </details>

</div>
`;
        });

        document.getElementById("results").innerHTML = html;

    }
    catch(error){
        console.log(error);
        document.getElementById("results").innerHTML = "Error loading weather data";
    }
}

</script>

</body>
</html>
